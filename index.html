<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Tasks - To-Do List</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
      integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="main-container">
      <!-- Header Section -->
      <div class="bg-primary text-white py-4 mb-4 shadow">
        <div class="container-fluid">
          <div class="row align-items-center">
            <div class="col">
              <h1 class="display-4 mb-0">
                <i class="fas fa-check-circle mr-3"></i>
                My Tasks
              </h1>
              <p class="lead mb-0">Stay organized and productive</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Add Task Form -->
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <form class="add-task-form" id="addTaskForm">
            <div class="input-group input-group-lg">
              <input type="text" class="form-control" id="taskInput" placeholder="What needs to be done?"
                     aria-label="New task" required>
              <div class="input-group-append">
                <button class="btn btn-primary" type="submit">
                  <i class="fas fa-plus"></i> Add Task
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Tasks List -->
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <ul class="nav nav-tabs card-header-tabs" id="taskTabs" role="tablist">
            <li class="nav-item">
              <a class="nav-link active" id="all-tab" data-toggle="tab" href="#all" role="tab">All Tasks</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" id="pending-tab" data-toggle="tab" href="#pending" role="tab">Pending</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" id="completed-tab" data-toggle="tab" href="#completed" role="tab">Completed</a>
            </li>
          </ul>
        </div>

        <div class="card-body p-0">
          <div class="tab-content">
            <!-- All Tasks Tab -->
            <div class="tab-pane fade show active" id="all" role="tabpanel">
              <div class="list-group list-group-flush" id="allTasksList">
                <!-- Tasks will be dynamically added here -->
              </div>
            </div>

            <!-- Pending Tasks Tab -->
            <div class="tab-pane fade" id="pending" role="tabpanel">
              <div class="list-group list-group-flush" id="pendingTasksList">
                <!-- Tasks will be dynamically added here -->
              </div>
            </div>

            <!-- Completed Tasks Tab -->
            <div class="tab-pane fade" id="completed" role="tabpanel">
              <div class="list-group list-group-flush" id="completedTasksList">
                <!-- Tasks will be dynamically added here -->
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Task Statistics -->
      <div class="row mt-4">
        <div class="col-md-4 mb-3">
          <div class="card text-center shadow-sm">
            <div class="card-body">
              <h3 class="text-primary mb-1" id="totalTasks">0</h3>
              <p class="text-muted mb-0">Total Tasks</p>
            </div>
          </div>
        </div>
        <div class="col-md-4 mb-3">
          <div class="card text-center shadow-sm">
            <div class="card-body">
              <h3 class="text-warning mb-1" id="pendingTasks">0</h3>
              <p class="text-muted mb-0">Pending</p>
            </div>
          </div>
        </div>
        <div class="col-md-4 mb-3">
          <div class="card text-center shadow-sm">
            <div class="card-body">
              <h3 class="text-success mb-1" id="completedTasks">0</h3>
              <p class="text-muted mb-0">Completed</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty State Template -->
      <div class="empty-state d-none" id="emptyState">
        <i class="fas fa-clipboard-list"></i>
        <h4>No tasks yet</h4>
        <p class="text-muted">Add your first task above to get started!</p>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
    <script src="app.js"></script>
  </body>
</html>
